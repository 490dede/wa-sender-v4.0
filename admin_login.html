<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - WA-Sender v4.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #f4f7f6;
            --tosca-light: #40E0D0;
            --btn-blue: #4A90E2;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            width: 90%;
            max-width: 380px;
            background: var(--white);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            position: relative;
        }

        .header-shape {
            background: var(--tosca-light);
            height: 140px;
            width: 150%;
            position: absolute;
            top: -65px;
            left: -25%;
            border-bottom-left-radius: 50%;
            border-bottom-right-radius: 50%;
            z-index: 1;
        }

        .login-content {
            position: relative;
            z-index: 2;
            padding: 30px 25px;
            text-align: center;
        }

        .login-content h2 {
            font-size: 19px;
            color: var(--white); /* Judul Putih sesuai revisi tim */
            margin: 0 0 55px 0; /* Memberi ruang agar teks di area Tosca */
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-style: italic; /* Label miring sesuai panduan */
            color: #555;
            margin-bottom: 8px;
        }

        .input-control {
            width: 100%;
            padding: 14px;
            border: 1px solid #e8e8e8;
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            box-sizing: border-box;
            background: #fdfdfd;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--btn-blue);
            color: var(--white);
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.25);
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="header-shape"></div>
    <div class="login-content">
        <h2>Admin Login</h2>
        
        <div class="form-group">
            <label class="form-label">Email Admin / Surel Admin:</label>
            <input type="email" class="input-control" placeholder="admin@email.com">
        </div>

        <div class="form-group">
            <label class="form-label">Password / Kata Sandi:</label>
            <input type="password" class="input-control" placeholder="••••••••">
        </div>

        <button class="btn-login">LOGIN ADMIN / MASUK</button>
    </div>
</div>

</body>
</html>
