<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - WA-Sender v4.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #f4f7f6;
            --primary: #4A90E2;
            --text-dark: #333;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Shape Tipuan Header */
        .login-container {
            width: 90%;
            max-width: 380px;
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            position: relative;
        }

        .header-shape {
            background: var(--primary);
            height: 120px;
            width: 150%;
            position: absolute;
            top: -50px;
            left: -25%;
            border-bottom-left-radius: 50%;
            border-bottom-right-radius: 50%;
            z-index: 1;
        }

        .login-content {
            position: relative;
            z-index: 2;
            padding: 40px 25px 30px;
            text-align: center;
        }

        .login-content h2 {
            font-size: 20px;
            color: var(--white);
            margin-bottom: 40px;
            font-weight: 600;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-style: italic; /* Judul kolom tidak bold tapi italic */
            color: #666;
            margin-bottom: 8px;
            padding-left: 5px;
        }

        .input-control {
            width: 100%;
            padding: 14px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            box-sizing: border-box;
            background: #fafafa;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.3);
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="header-shape"></div>
    <div class="login-content">
        <h2>ADMIN LOGIN</h2>
        
        <div class="form-group">
            <label class="form-label">Email Admin / Surel Admin:</label>
            <input type="email" class="input-control" placeholder="admin@email.com">
        </div>

        <div class="form-group">
            <label class="form-label">Password / Kata Sandi:</label>
            <input type="password" class="input-control" placeholder="••••••••">
        </div>

        <button class="btn-login">LOGIN ADMIN / MASUK</button>
    </div>
</div>

</body>
</html>
