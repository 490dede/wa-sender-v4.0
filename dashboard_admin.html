<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Standard UI Kit</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f4f7f6; --tosca: #40E0D0; --primary: #4A90E2; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        
        header { background: var(--white); padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .menu-btn { font-size: 24px; cursor: pointer; background: none; border: none; margin-right: 15px; }

        .container { padding: 20px; }
        .filter-card { background: var(--white); padding: 18px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .label { display: block; font-size: 11px; font-style: italic; color: #666; margin-bottom: 10px; }
        
        /* Kolom Trigger Utama */
        .datepicker-trigger {
            display: flex; align-items: center; background: #fafafa; border: 1px solid #e0e0e0;
            border-radius: 25px; padding: 12px 18px; cursor: pointer; font-size: 13px; font-weight: 600;
        }

        /* OVERLAY POP-UP */
        #calendarOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;
        }

        .calendar-popup {
            width: 88%; max-width: 330px; background: var(--white); border-radius: 20px;
            padding: 15px; box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .nav-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .nav-btn { background: #f0f0f0; border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; font-size: 16px; color: var(--primary); display: flex; align-items: center; justify-content: center; }

        .month-frame { border: 1px solid var(--tosca); border-radius: 12px; padding: 10px; margin-bottom: 10px; }
        .month-title { font-size: 12px; font-weight: 700; text-align: center; margin-bottom: 8px; color: #008080; text-transform: uppercase; }

        /* GRID VERTIKAL PER HARI */
        .vertical-grid {
            display: grid; grid-template-rows: repeat(7, 1fr); grid-auto-flow: column;
            gap: 4px; font-size: 11px;
        }

        .d-name { font-weight: 800; color: var(--primary); text-align: center; padding: 6px 4px; border-right: 1px solid #eee; background: #fdfdfd; }
        .d-num { text-align: center; padding: 10px 0; border-radius: 6px; cursor: pointer; color: #555; transition: 0.1s; }
        .d-num.empty { cursor: default; }
        
        /* State Warna Blok Pilihan */
        .d-num.active-bound { background: var(--primary) !important; color: white !important; font-weight: bold; }
        .d-num.in-between { background: rgba(64, 224, 208, 0.3); color: #008080; }

        .popup-footer { display: flex; gap: 10px; margin-top: 10px; }
        .btn-foot { flex: 1; padding: 14px; border-radius: 10px; border: none; font-weight: 600; font-size: 12px; cursor: pointer; }
        .apply-btn { background: var(--tosca); color: #008080; }
    </style>
</head>
<body>

<header>
    <button class="menu-btn">☰</button>
    <div style="font-weight: 600; color: var(--primary);">WA-Sender v4.0</div>
</header>

<div class="container">
    <div class="filter-card">
        <label class="label">Pilih Periode / Select Period:</label>
        <div class="datepicker-trigger" onclick="openCalendar()">
            <span id="displayRange">Pilih Rentang Tanggal</span>
        </div>
    </div>
</div>

<div id="calendarOverlay">
    <div class="calendar-popup">
        <div class="nav-controls">
            <button class="nav-btn" onclick="changeMonth(-1)">▲</button>
            <b style="font-size: 13px; color: #333;">NAVIGASI BULAN</b>
            <button class="nav-btn" onclick="changeMonth(1)">▼</button>
        </div>

        <div id="calendarView">
            </div>

        <div class="popup-footer">
            <button class="btn-foot" style="background:#eee" onclick="closeCalendar()">CANCEL</button>
            <button class="btn-foot apply-btn" onclick="applySelection()">APPLY</button>
        </div>
    </div>
</div>

<script>
    let startDate = null; // Objek Date
    let endDate = null;   // Objek Date
    let viewDate = new Date(); // Bulan dasar yang ditampilkan

    const months = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agu", "Sep", "Okt", "Nov", "Des"];

    function openCalendar() {
        document.getElementById('calendarOverlay').style.display = 'flex';
        renderCalendar();
    }

    function closeCalendar() {
        document.getElementById('calendarOverlay').style.display = 'none';
    }

    function changeMonth(offset) {
        viewDate.setMonth(viewDate.getMonth() + offset);
        renderCalendar();
    }

    function renderCalendar() {
        const view = document.getElementById('calendarView');
        view.innerHTML = '';

        // Tampilkan 2 bulan berturut-turut
        for (let i = 0; i < 2; i++) {
            let d = new Date(viewDate.getFullYear(), viewDate.getMonth() + i, 1);
            view.appendChild(createMonthFrame(d.getMonth(), d.getFullYear()));
        }
    }

    function createMonthFrame(month, year) {
        const frame = document.createElement('div');
        frame.className = 'month-frame';
        
        const title = document.createElement('div');
        title.className = 'month-title';
        title.innerText = `${months[month]} ${year}`;
        frame.appendChild(title);

        const grid = document.createElement('div');
        grid.className = 'vertical-grid';

        // Header Hari (Minggu - Sabtu)
        const days = ['M', 'S', 'S', 'R', 'K', 'J', 'S'];
        days.forEach(day => {
            const dName = document.createElement('div');
            dName.className = 'd-name';
            dName.innerText = day;
            grid.appendChild(dName);
        });

        const firstDay = new Date(year, month, 1).getDay();
        const totalDays = new Date(year, month + 1, 0).getDate();

        // Mengisi sel kosong sebelum tanggal 1
        for (let i = 0; i < firstDay; i++) {
            const empty = document.createElement('div');
            empty.className = 'd-num empty';
            grid.appendChild(empty);
        }

        // Mengisi tanggal
        for (let i = 1; i <= totalDays; i++) {
            const curDate = new Date(year, month, i);
            const dNum = document.createElement('div');
            dNum.className = 'd-num';
            dNum.innerText = i;

            // Logika Highlighting
            if (startDate && curDate.getTime() === startDate.getTime()) dNum.classList.add('active-bound');
            if (endDate && curDate.getTime() === endDate.getTime()) dNum.classList.add('active-bound');
            if (startDate && endDate && curDate > startDate && curDate < endDate) dNum.classList.add('in-between');

            dNum.onclick = () => handleDateClick(curDate);
            grid.appendChild(dNum);
        }

        frame.appendChild(grid);
        return frame;
    }

    function handleDateClick(date) {
        if (!startDate || (startDate && endDate)) {
            startDate = date;
            endDate = null;
        } else {
            if (date < startDate) {
                endDate = startDate;
                startDate = date;
            } else if (date.getTime() === startDate.getTime()) {
                startDate = null;
            } else {
                endDate = date;
            }
        }
        renderCalendar();
    }

    function applySelection() {
        if (startDate && endDate) {
            const format = (d) => `${d.getDate()} ${months[d.getMonth()]}`;
            document.getElementById('displayRange').innerText = `${format(startDate)} - ${format(endDate)}`;
            closeCalendar();
        } else {
            alert("Pilih rentang tanggal terlebih dahulu!");
        }
    }
</script>

</body>
</html>
