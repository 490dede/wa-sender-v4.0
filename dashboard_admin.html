<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - WA-Sender v4.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        :root { --bg: #f4f7f6; --tosca: #40E0D0; --primary: #4A90E2; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        
        header { background: var(--white); padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .menu-btn { font-size: 24px; cursor: pointer; background: none; border: none; margin-right: 15px; }
        .app-title { font-weight: 600; color: var(--primary); }

        .admin-id { background: var(--white); padding: 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #eee; }
        .admin-id img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--tosca); }
        .admin-info { font-size: 12px; line-height: 1.4; }
        .admin-info b { display: block; font-size: 14px; color: #333; }

        .container { padding: 20px; }
        
        /* Filter Rentang Tanggal Sesuai Konsep Panah & Lingkaran */
        .filter-card { background: var(--white); padding: 18px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .label { display: block; font-size: 11px; font-style: italic; color: #666; margin-bottom: 8px; }
        
        .date-range-container { position: relative; display: flex; flex-direction: column; gap: 10px; }
        .date-input-group { display: flex; align-items: center; gap: 10px; }
        .circle-point { width: 10px; height: 10px; border: 2px solid var(--primary); border-radius: 50%; flex-shrink: 0; }
        .arrow-line { width: 2px; height: 20px; background: var(--primary); margin-left: 4px; position: relative; }
        .arrow-line::after { content: '▼'; position: absolute; bottom: -8px; left: -5px; font-size: 10px; color: var(--primary); }
        
        .input { width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 13px; box-sizing: border-box; background: #fafafa; }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--tosca); color: #008080; padding: 18px; border-radius: 15px; text-align: center; }
        .stat-card small { font-size: 10px; font-weight: 600; display: block; margin-bottom: 5px; opacity: 0.8; }
        .stat-card b { font-size: 24px; }

        .btn-export { width: 100%; padding: 16px; background: #27ae60; color: #fff; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 14px; box-shadow: 0 4px 10px rgba(39, 174, 96, 0.2); }

        .sidenav { height: 100%; width: 0; position: fixed; z-index: 1000; top: 0; left: 0; background-color: var(--white); overflow-x: hidden; transition: 0.3s; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        .sidenav a { padding: 15px 25px; text-decoration: none; font-size: 15px; color: #444; display: block; border-bottom: 1px solid #f9f9f9; }
    </style>
</head>
<body>

<div id="mySidenav" class="sidenav">
    <a href="javascript:void(0)" onclick="closeNav()" style="padding: 20px; text-align: right; font-size: 30px;">&times;</a>
    <a href="dashboard_admin.html" style="font-weight:600; color:var(--primary);">📊 Dashboard Analytics</a>
    <a href="post_editor_staff.html">📝 Post Editor</a>
    <a href="admin_revenue.html">💰 Revenue Tracking</a>
    <a href="admin_chat_bantuan.html">💬 Chat Bantuan</a>
    <a href="user_login.html" style="color:red; margin-top:20px;">🚪 Logout</a>
</div>

<header>
    <button class="menu-btn" onclick="openNav()">☰</button>
    <div class="app-title">WA-Sender v4.0</div>
</header>

<div class="admin-id">
    <img src="https://via.placeholder.com/100" alt="Admin">
    <div class="admin-info">
        <small style="color:var(--primary); font-weight:600;">ACCESS: STAF ADMIN</small>
        <b>M. Ali Ridho (Ali)</b>
        <span>adeali490@gmail.com</span>
    </div>
</div>

<div class="container">
    <div class="filter-card">
        <label class="label">Filter Rentang Tanggal / Custom Date Range:</label>
        
        <div class="date-range-container">
            <div class="date-input-group">
                <div class="circle-point"></div>
                <input type="date" class="input" placeholder="Dari Tanggal">
            </div>
            
            <div class="arrow-line"></div>
            
            <div class="date-input-group">
                <div class="circle-point"></div>
                <input type="date" class="input" placeholder="Sampai Tanggal">
            </div>
        </div>

        <label class="label" style="margin-top: 20px;">Filter Negara / Select Country:</label>
        <select class="input">
            <option>Semua Negara / All Countries</option>
            <option>Indonesia (+62)</option>
            <option>Mexico (+52)</option>
            <option>United States (+1)</option>
        </select>
    </div>

    <div class="stat-grid">
        <div class="stat-card">
            <small>TOTAL USER</small>
            <b>1.240</b>
        </div>
        <div class="stat-card">
            <small>USER AKTIF</small>
            <b>856</b>
        </div>
    </div>

    <button class="btn-export">EXPORT DATA TO EXCEL (.xlsx)</button>
</div>

<script>
    function openNav() { document.getElementById("mySidenav").style.width = "280px"; }
    function closeNav() { document.getElementById("mySidenav").style.width = "0"; }
</script>
</body>
</html>
