<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - WA-Sender v4.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/litepicker/dist/css/litepicker.css">
    <style>
        :root { --bg: #f4f7f6; --tosca: #40E0D0; --primary: #4A90E2; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        
        header { background: var(--white); padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .menu-btn { font-size: 24px; cursor: pointer; background: none; border: none; margin-right: 15px; }
        .app-title { font-weight: 600; color: var(--primary); }

        .admin-id { background: var(--white); padding: 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #eee; }
        .admin-id img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--tosca); }
        .admin-info { font-size: 12px; }
        .admin-info b { display: block; font-size: 14px; }

        .container { padding: 20px; }
        .filter-card { background: var(--white); padding: 18px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .label { display: block; font-size: 11px; font-style: italic; color: #666; margin-bottom: 10px; }

        /* Style Kolom Tanggal Tunggal Sesuai Permintaan */
        .datepicker-container {
            display: flex;
            align-items: center;
            background: #fafafa;
            border: 1px solid #e0e0e0;
            border-radius: 25px; /* Lingkaran/Rounded */
            padding: 8px 15px;
            cursor: pointer;
            transition: 0.3s;
        }
        .datepicker-container:hover { border-color: var(--primary); }
        .datepicker-container i { color: var(--primary); margin-right: 10px; font-size: 16px; }
        #litepicker {
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 13px;
            color: #333;
            width: 100%;
            cursor: pointer;
            outline: none;
            font-weight: 600;
        }

        .input-select { width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 13px; box-sizing: border-box; background: #fafafa; margin-top: 15px; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--tosca); color: #008080; padding: 18px; border-radius: 15px; text-align: center; }
        .stat-card b { font-size: 24px; display: block; margin-top: 5px; }

        .btn-export { width: 100%; padding: 16px; background: #27ae60; color: #fff; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 14px; }

        /* Sidenav */
        .sidenav { height: 100%; width: 0; position: fixed; z-index: 1000; top: 0; left: 0; background-color: var(--white); overflow-x: hidden; transition: 0.3s; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        .sidenav a { padding: 15px 25px; text-decoration: none; font-size: 15px; color: #444; display: block; border-bottom: 1px solid #f9f9f9; }
    </style>
</head>
<body>

<div id="mySidenav" class="sidenav">
    <a href="javascript:void(0)" onclick="closeNav()" style="padding: 20px; text-align: right; font-size: 30px;">&times;</a>
    <a href="dashboard_admin.html" style="font-weight:600; color:var(--primary);">📊 Dashboard</a>
    <a href="post_editor_staff.html">📝 Post Editor</a>
    <a href="admin_revenue.html">💰 Revenue Tracking</a>
    <a href="admin_chat_bantuan.html">💬 Chat Bantuan</a>
    <a href="user_login.html" style="color:red; margin-top:20px;">🚪 Logout</a>
</div>

<header>
    <button class="menu-btn" onclick="openNav()">☰</button>
    <div class="app-title">WA-Sender v4.0</div>
</header>

<div class="admin-id">
    <img src="https://via.placeholder.com/100" alt="Admin">
    <div class="admin-info">
        <small style="color:var(--primary); font-weight:600;">STAF ADMIN</small>
        <b>M. Ali Ridho</b>
        <span>adeali490@gmail.com</span>
    </div>
</div>

<div class="container">
    <div class="filter-card">
        <label class="label">Pilih Periode / Select Period:</label>
        
        <div class="datepicker-container" id="picker-trigger">
            <span>📅</span>
            <input type="text" id="litepicker" readonly placeholder="Pilih Rentang Tanggal">
        </div>

        <select class="input-select">
            <option>Semua Negara / All Countries</option>
            <option>Indonesia (+62)</option>
        </select>
    </div>

    <div class="stat-grid">
        <div class="stat-card"><small>TOTAL USER</small><b>1.240</b></div>
        <div class="stat-card"><small>USER AKTIF</small><b>856</b></div>
    </div>

    <button class="btn-export">EXPORT DATA (.xlsx)</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/litepicker/dist/litepicker.js"></script>
<script>
    function openNav() { document.getElementById("mySidenav").style.width = "280px"; }
    function closeNav() { document.getElementById("mySidenav").style.width = "0"; }

    // Inisialisasi Kalender Ganda
    const picker = new Litepicker({
        element: document.getElementById('litepicker'),
        singleMode: false, // Mengaktifkan Rentang (Range)
        numberOfMonths: 2, // Menampilkan 2 bulan sekaligus
        numberOfColumns: 2,
        format: 'DD MMM - DD MMM', // Format tampilan dalam kolom
        tooltipText: {
            one: 'hari',
            other: 'hari'
        },
        setup: (picker) => {
            picker.on('selected', (date1, date2) => {
                console.log('Rentang terpilih:', date1, date2);
            });
        },
    });
</script>
</body>
</html>
