<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - WA-Sender v4.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f4f7f6; --tosca: #40E0D0; --primary: #4A90E2; --white: #ffffff; --text: #333; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        
        header { background: var(--white); padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .menu-btn { font-size: 24px; cursor: pointer; background: none; border: none; margin-right: 15px; }
        .app-title { font-weight: 600; color: var(--primary); font-size: 16px; }

        .container { padding: 20px; }
        .filter-card { background: var(--white); padding: 18px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .label { display: block; font-size: 11px; font-style: italic; color: #666; margin-bottom: 10px; }
        
        /* Kolom Lingkaran Trigger */
        .datepicker-trigger {
            display: flex; align-items: center; background: #fafafa; border: 1px solid #e0e0e0;
            border-radius: 25px; padding: 10px 18px; cursor: pointer; font-size: 13px; font-weight: 600;
        }

        /* OVERLAY POP-UP */
        #calendarOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center;
        }

        .calendar-popup {
            width: 85%; max-width: 320px; background: var(--white); border-radius: 20px;
            padding: 15px; box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .calendar-header b { font-size: 14px; color: #008080; }

        .month-frame { border: 1px solid var(--tosca); border-radius: 12px; padding: 10px; margin-bottom: 12px; }
        
        /* GRID VERTIKAL LOGIC */
        .vertical-calendar-grid {
            display: grid; grid-template-rows: repeat(7, 1fr); grid-auto-flow: column;
            gap: 4px; font-size: 11px;
        }

        .day-name { font-weight: 800; color: var(--primary); text-align: center; padding: 4px; border-right: 1px solid #eee; background: #f9f9f9; }
        .day-num { text-align: center; padding: 8px 4px; border-radius: 6px; cursor: pointer; color: #555; position: relative; }
        
        /* State Warna Blok */
        .day-num.selected-bound { background: var(--primary) !important; color: white !important; font-weight: bold; }
        .day-num.in-range { background: rgba(64, 224, 208, 0.3); color: #008080; }
        .day-num:active { background: var(--tosca); }

        .popup-footer { display: flex; gap: 10px; margin-top: 10px; }
        .btn-action { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: 600; font-size: 12px; cursor: pointer; }
        .btn-cancel { background: #eee; color: #666; }
        .btn-apply { background: var(--tosca); color: #008080; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .stat-card { background: var(--tosca); color: #008080; padding: 15px; border-radius: 15px; text-align: center; }
        .stat-card b { font-size: 20px; display: block; }
    </style>
</head>
<body>

<header>
    <button class="menu-btn">☰</button>
    <div class="app-title">WA-Sender v4.0</div>
</header>

<div class="container">
    <div class="filter-card">
        <label class="label">Pilih Periode / Select Period:</label>
        <div class="datepicker-trigger" onclick="openPopup()">
            <span>📅</span> &nbsp; <span id="dateDisplay">Klik untuk pilih tanggal</span>
        </div>
    </div>

    <div class="stat-grid">
        <div class="stat-card"><small>TOTAL USER</small><b>1.240</b></div>
        <div class="stat-card"><small>USER AKTIF</small><b>856</b></div>
    </div>
</div>

<div id="calendarOverlay">
    <div class="calendar-popup">
        <div class="calendar-header">
            <b>RENTANG TANGGAL</b>
            <span onclick="closePopup()" style="cursor:pointer; font-weight: bold;">✕</span>
        </div>

        <div id="calendarContainer">
            <div class="month-frame" data-month="Maret">
                <div style="font-size: 12px; font-weight: 700; margin-bottom: 8px; text-align: center;">Maret 2026</div>
                <div class="vertical-calendar-grid">
                    <div class="day-name">M</div><div class="day-name">S</div><div class="day-name">S</div><div class="day-name">R</div><div class="day-name">K</div><div class="day-name">J</div><div class="day-name">S</div>
                    <script>
                        for(let i=1; i<=28; i++) {
                            document.write(`<div class="day-num" data-val="${i}" onclick="selectDate(${i}, this)">${i}</div>`);
                        }
                    </script>
                </div>
            </div>
        </div>

        <div class="popup-footer">
            <button class="btn-action btn-cancel" onclick="closePopup()">BATAL</button>
            <button class="btn-action btn-apply" onclick="confirmDate()">APPLY</button>
        </div>
    </div>
</div>

<script>
    let startDate = null;
    let endDate = null;

    function openPopup() {
        document.getElementById('calendarOverlay').style.display = 'flex';
    }

    function closePopup() {
        document.getElementById('calendarOverlay').style.display = 'none';
        resetSelection();
    }

    function selectDate(val, el) {
        if (!startDate || (startDate && endDate)) {
            // Reset jika sudah ada rentang atau baru mulai
            resetSelection();
            startDate = val;
            endDate = null;
            el.classList.add('selected-bound');
        } else {
            // Pilih tanggal akhir
            if (val < startDate) {
                endDate = startDate;
                startDate = val;
            } else {
                endDate = val;
            }
            highlightRange();
        }
    }

    function highlightRange() {
        const allDays = document.querySelectorAll('.day-num');
        allDays.forEach(day => {
            const val = parseInt(day.getAttribute('data-val'));
            day.classList.remove('selected-bound', 'in-range');
            
            if (val === startDate || val === endDate) {
                day.classList.add('selected-bound');
            } else if (val > startDate && val < endDate) {
                day.classList.add('in-range');
            }
        });
    }

    function resetSelection() {
        startDate = null;
        endDate = null;
        document.querySelectorAll('.day-num').forEach(day => {
            day.classList.remove('selected-bound', 'in-range');
        });
    }

    function confirmDate() {
        if (startDate && endDate) {
            const rangeText = `${startDate} Mar - ${endDate} Mar`;
            document.getElementById('dateDisplay').innerText = rangeText;
            document.getElementById('calendarOverlay').style.display = 'none';
        } else {
            alert("Silakan pilih rentang tanggal (Mulai dan Akhir)");
        }
    }
</script>

</body>
</html>
