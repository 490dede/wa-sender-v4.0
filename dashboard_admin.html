<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - WA-Sender v4.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f4f7f6; --tosca: #40E0D0; --primary: #4A90E2; --white: #ffffff; --text: #333; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; overflow-x: hidden; }
        
        /* Header */
        header { background: var(--white); padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .menu-btn { font-size: 24px; cursor: pointer; background: none; border: none; margin-right: 15px; }
        .app-title { font-weight: 600; color: var(--primary); font-size: 16px; }

        .container { padding: 20px; }

        /* Filter Kolom Lingkaran */
        .filter-card { background: var(--white); padding: 18px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .label { display: block; font-size: 11px; font-style: italic; color: #666; margin-bottom: 10px; }
        
        .datepicker-trigger {
            display: flex; align-items: center; background: #fafafa; border: 1px solid #e0e0e0;
            border-radius: 25px; padding: 10px 18px; cursor: pointer; font-size: 13px; font-weight: 600;
        }

        /* OVERLAY POP-UP TENGAH LAYAR */
        #calendarOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;
        }

        .calendar-popup {
            width: 85%; max-width: 320px; background: var(--white); border-radius: 20px;
            padding: 15px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 5px; }
        .calendar-header b { font-size: 14px; color: #008080; }

        /* GRID VERTIKAL: Minggu di Atas, Sabtu di Bawah */
        .month-frame {
            border: 1px solid var(--tosca); border-radius: 12px; padding: 10px; margin-bottom: 15px;
        }
        
        .vertical-calendar-grid {
            display: grid;
            grid-template-rows: repeat(7, 1fr); /* 7 baris untuk hari */
            grid-auto-flow: column; /* Mengalir ke samping */
            gap: 5px;
            font-size: 11px; /* Ukuran teks diperkecil sesuai permintaan */
        }

        .day-name { font-weight: 700; color: var(--primary); text-align: center; padding: 4px; border-right: 1px solid #eee; }
        .day-num { text-align: center; padding: 6px; border-radius: 6px; cursor: pointer; transition: 0.2s; color: #555; }
        .day-num:hover { background: var(--tosca); color: #008080; }
        .day-num.selected { background: var(--primary); color: white; }

        .popup-footer { display: flex; gap: 10px; margin-top: 10px; }
        .btn-action { flex: 1; padding: 10px; border-radius: 8px; border: none; font-weight: 600; font-size: 12px; cursor: pointer; }
        .btn-cancel { background: #eee; color: #666; }
        .btn-apply { background: var(--tosca); color: #008080; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .stat-card { background: var(--tosca); color: #008080; padding: 15px; border-radius: 15px; text-align: center; }
        .stat-card b { font-size: 20px; display: block; }
    </style>
</head>
<body>

<header>
    <button class="menu-btn">☰</button>
    <div class="app-title">WA-Sender v4.0</div>
</header>

<div class="container">
    <div class="filter-card">
        <label class="label">Pilih Periode / Select Period:</label>
        <div class="datepicker-trigger" onclick="togglePopup()">
            <span>📅</span> &nbsp; <span id="dateDisplay">01 Mar - 02 Mar</span>
        </div>
    </div>

    <div class="stat-grid">
        <div class="stat-card"><small>TOTAL USER</small><b>1.240</b></div>
        <div class="stat-card"><small>USER AKTIF</small><b>856</b></div>
    </div>
</div>

<div id="calendarOverlay">
    <div class="calendar-popup">
        <div class="calendar-header">
            <b>PILIH RENTANG</b>
            <span onclick="togglePopup()" style="cursor:pointer">✕</span>
        </div>

        <div class="month-frame">
            <div style="font-size: 12px; font-weight: 600; margin-bottom: 8px; text-align: center;">Maret 2026</div>
            <div class="vertical-calendar-grid">
                <div class="day-name">M</div><div class="day-name">S</div><div class="day-name">S</div><div class="day-name">R</div><div class="day-name">K</div><div class="day-name">J</div><div class="day-name">S</div>
                <div class="day-num">1</div><div class="day-num">2</div><div class="day-num">3</div><div class="day-num">4</div><div class="day-num">5</div><div class="day-num">6</div><div class="day-num">7</div>
                <div class="day-num">8</div><div class="day-num">9</div><div class="day-num">10</div><div class="day-num">11</div><div class="day-num">12</div><div class="day-num">13</div><div class="day-num">14</div>
                <div class="day-num">15</div><div class="day-num">16</div><div class="day-num">17</div><div class="day-num">18</div><div class="day-num">19</div><div class="day-num">20</div><div class="day-num">21</div>
            </div>
        </div>

        <div class="month-frame">
            <div style="font-size: 12px; font-weight: 600; margin-bottom: 8px; text-align: center;">April 2026</div>
            <div class="vertical-calendar-grid">
                <div class="day-name">M</div><div class="day-name">S</div><div class="day-name">S</div><div class="day-name">R</div><div class="day-name">K</div><div class="day-name">J</div><div class="day-name">S</div>
                <div class="day-num">1</div><div class="day-num">2</div><div class="day-num">3</div><div class="day-num">4</div><div class="day-num">5</div><div class="day-num">6</div><div class="day-num">7</div>
                <div class="day-num">8</div><div class="day-num">9</div><div class="day-num">10</div><div class="day-num">11</div><div class="day-num">12</div><div class="day-num">13</div><div class="day-num">14</div>
            </div>
        </div>

        <div class="popup-footer">
            <button class="btn-action btn-cancel" onclick="togglePopup()">BATAL</button>
            <button class="btn-action btn-apply" onclick="applyDate()">APPLY</button>
        </div>
    </div>
</div>

<script>
    function togglePopup() {
        const overlay = document.getElementById('calendarOverlay');
        overlay.style.display = (overlay.style.display === 'flex') ? 'none' : 'flex';
    }

    function applyDate() {
        // Simulasi apply tanggal
        document.getElementById('dateDisplay').innerText = "05 Mar - 20 Mar";
        togglePopup();
    }
</script>

</body>
</html>
