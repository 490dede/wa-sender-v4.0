<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - WA-Sender v4.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f4f7f6; --tosca: #40E0D0; --primary: #4A90E2; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        
        header { background: var(--white); padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .menu-btn { font-size: 24px; cursor: pointer; background: none; border: none; margin-right: 15px; }

        .container { padding: 20px; }
        .filter-card { background: var(--white); padding: 18px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .label { display: block; font-size: 11px; font-style: italic; color: #666; margin-bottom: 10px; }
        
        .datepicker-trigger {
            display: flex; align-items: center; background: #fafafa; border: 1px solid #e0e0e0;
            border-radius: 25px; padding: 12px 18px; cursor: pointer; font-size: 13px; font-weight: 600;
        }

        /* POP-UP OVERLAY */
        #calendarOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;
        }

        .calendar-popup {
            width: 88%; max-width: 330px; background: var(--white); border-radius: 20px;
            padding: 15px; box-shadow: 0 15px 40px rgba(0,0,0,0.3); position: relative;
        }

        /* Navigasi Atas-Bawah */
        .nav-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .nav-btn { background: #f0f0f0; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-size: 16px; color: var(--primary); display: flex; align-items: center; justify-content: center; }

        .month-frame { border: 1px solid var(--tosca); border-radius: 12px; padding: 10px; margin-bottom: 10px; background: #fff; }
        .month-title { font-size: 12px; font-weight: 700; text-align: center; margin-bottom: 8px; color: #008080; }

        /* GRID VERTIKAL PER HARI */
        .vertical-grid {
            display: grid; grid-template-rows: repeat(7, 1fr); grid-auto-flow: column;
            gap: 4px; font-size: 11px;
        }

        .d-name { font-weight: 800; color: var(--primary); text-align: center; padding: 4px; border-right: 1px solid #eee; background: #fdfdfd; }
        .d-num { text-align: center; padding: 8px 0; border-radius: 6px; cursor: pointer; color: #555; transition: 0.2s; }
        
        /* Range States */
        .d-num.active-bound { background: var(--primary) !important; color: white !important; font-weight: bold; }
        .d-num.in-between { background: rgba(64, 224, 208, 0.3); color: #008080; }

        .popup-footer { display: flex; gap: 10px; margin-top: 10px; }
        .btn-foot { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: 600; font-size: 12px; cursor: pointer; }
        .apply-btn { background: var(--tosca); color: #008080; }
    </style>
</head>
<body>

<header>
    <button class="menu-btn">☰</button>
    <div style="font-weight: 600; color: var(--primary);">WA-Sender v4.0</div>
</header>

<div class="container">
    <div class="filter-card">
        <label class="label">Periode Laporan / Report Period:</label>
        <div class="datepicker-trigger" onclick="openCal()">
            <span>📅</span> &nbsp; <span id="displayRange">Pilih Rentang Tanggal</span>
        </div>
    </div>
</div>

<div id="calendarOverlay">
    <div class="calendar-popup">
        <div class="nav-controls">
            <button class="nav-btn" onclick="prevMonth()">▲</button>
            <b style="font-size: 13px; color: #333;">GESER BULAN</b>
            <button class="nav-btn" onclick="nextMonth()">▼</button>
        </div>

        <div id="calendarContainer">
            <div class="month-frame">
                <div class="month-title" id="m1-title">Maret 2026</div>
                <div class="vertical-grid" id="m1-grid">
                    <div class="d-name">M</div><div class="d-name">S</div><div class="d-name">S</div><div class="d-name">R</div><div class="d-name">K</div><div class="d-name">J</div><div class="d-name">S</div>
                    </div>
            </div>
            <div class="month-frame">
                <div class="month-title" id="m2-title">April 2026</div>
                <div class="vertical-grid" id="m2-grid">
                    <div class="d-name">M</div><div class="d-name">S</div><div class="d-name">S</div><div class="d-name">R</div><div class="d-name">K</div><div class="d-name">J</div><div class="d-name">S</div>
                    </div>
            </div>
        </div>

        <div class="popup-footer">
            <button class="btn-foot" style="background:#eee" onclick="closeCal()">BATAL</button>
            <button class="btn-foot apply-btn" onclick="applyCal()">APPLY</button>
        </div>
    </div>
</div>

<script>
    let start = null; let end = null;
    let currentBaseMonth = 2; // Maret (0-indexed base)

    function openCal() { document.getElementById('calendarOverlay').style.display = 'flex'; renderDates(); }
    function closeCal() { document.getElementById('calendarOverlay').style.display = 'none'; }

    function renderDates() {
        fillGrid('m1-grid', 31, 1); // Maret
        fillGrid('m2-grid', 30, 32); // April (ID lanjut untuk demo range)
    }

    function fillGrid(targetId, days, startId) {
        const grid = document.getElementById(targetId);
        // Bersihkan angka lama tapi simpan header hari
        const headers = grid.querySelectorAll('.d-name');
        grid.innerHTML = '';
        headers.forEach(h => grid.appendChild(h));

        for(let i=1; i<=days; i++) {
            const id = startId + i - 1;
            const div = document.createElement('div');
            div.className = 'd-num';
            div.innerText = i;
            div.onclick = () => handleSelect(id);
            if(id === start || id === end) div.classList.add('active-bound');
            if(id > start && id < end) div.classList.add('in-between');
            grid.appendChild(div);
        }
    }

    function handleSelect(id) {
        if(!start || (start && end)) { start = id; end = null; }
        else { if(id < start) { end = start; start = id; } else { end = id; } }
        renderDates();
    }

    function applyCal() {
        if(start && end) {
            document.getElementById('displayRange').innerText = "Rentang Terpilih Aktif";
            closeCal();
        }
    }

    function nextMonth() { alert("Menggeser ke bulan depan..."); }
    function prevMonth() { alert("Menggeser ke bulan sebelumnya..."); }
</script>

</body>
</html>
