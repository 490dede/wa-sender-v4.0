<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Admin - WA-Sender v4.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        :root {
            --bg-soft: #f4f7f6; /* Warna terang meredam kontras */
            --primary: #4A90E2;
            --danger: #e74c3c;
            --success: #27ae60;
            --warning: #f39c12;
            --text-dark: #333;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background: var(--bg-soft);
            color: var(--text-dark);
        }

        /* Header sesuai standar revisi */
        header {
            background: white;
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #ddd;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .menu-btn { font-size: 24px; cursor: pointer; background: none; border: none; margin-right: 15px; }
        .app-title { font-weight: 600; font-size: 18px; flex-grow: 1; }

        .container { padding: 20px; }
        .page-title { font-size: 16px; font-weight: 600; margin-bottom: 20px; color: var(--primary); }

        /* Form Tambah Admin */
        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            margin-bottom: 25px;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: 600; color: #666; margin-bottom: 5px; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            box-sizing: border-box;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .btn-primary { background: var(--primary); color: white; }

        /* List Admin */
        .admin-list-item {
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-left: 5px solid var(--success);
        }

        .admin-list-item.inactive { border-left-color: #ccc; opacity: 0.7; }

        .admin-info h5 { margin: 0; font-size: 14px; }
        .admin-info p { margin: 3px 0 0; font-size: 12px; color: #888; }

        .action-btns { display: flex; gap: 8px; }
        .icon-btn {
            padding: 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: white;
            font-size: 12px;
        }

        .btn-suspend { background: var(--warning); }
        .btn-delete { background: var(--danger); }

        /* Sidenav Styles */
        .sidenav {
            height: 100%; width: 0; position: fixed; z-index: 1000; top: 0; left: 0;
            background-color: white; overflow-x: hidden; transition: 0.3s; box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }
        .sidenav a { padding: 15px 25px; text-decoration: none; font-size: 15px; color: #444; display: block; border-bottom: 1px solid #f9f9f9; }
        .closebtn { padding: 20px; text-align: right; font-size: 30px; cursor: pointer; display: block; }
    </style>
</head>
<body>

    <div id="mySidenav" class="sidenav">
        <span class="closebtn" onclick="closeNav()">&times;</span>
        <a href="dashboard_admin.html">📊 Dashboard Utama</a>
        <a href="admin_management.html" style="font-weight: bold; color: var(--primary);">🔑 Manage Admin</a>
        <a href="setting_bank.html">🏦 Setting Bank</a>
    </div>

    <header>
        <button class="menu-btn" onclick="openNav()">☰</button>
        <div class="app-title">WA-Sender v4.0</div>
    </header>

    <div class="container">
        <div class="page-title">PENGATURAN ADMIN (OWNER ONLY)</div>

        <div class="card">
            <label style="color: var(--primary); margin-bottom: 15px;">+ DAFTARKAN ADMIN BARU</label>
            <div class="form-group">
                <label>Nama Lengkap:</label>
                <input type="text" id="newAdminName" placeholder="Contoh: Budi Staf">
            </div>
            <div class="form-group">
                <label>Email Admin:</label>
                <input type="email" id="newAdminEmail" placeholder="admin.staff@email.com">
            </div>
            <button class="btn btn-primary" onclick="createAdmin()">SIMPAN & BERIKAN AKSES</button>
        </div>

        <label style="margin-bottom: 10px; display: block;">DAFTAR STAF ADMIN SAAT INI:</label>
        <div id="adminListContainer">
            <div class="admin-list-item">
                <div class="admin-info">
                    <h5>Loading Data...</h5>
                </div>
            </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('URL', 'KEY');

        function openNav() { document.getElementById("mySidenav").style.width = "280px"; }
        function closeNav() { document.getElementById("mySidenav").style.width = "0"; }

        // Fungsi Load Admin
        async function fetchAdmins() {
            const { data, error } = await _supabase
                .from('admin_profiles')
                .select('*')
                .neq('email', 'adeali490@gmail.com'); // Sembunyikan Owner dari list edit

            const container = document.getElementById('adminListContainer');
            container.innerHTML = '';

            if (data) {
                data.forEach(adm => {
                    const div = document.createElement('div');
                    div.className = `admin-list-item ${adm.status === 'Non-Aktif' ? 'inactive' : ''}`;
                    div.innerHTML = `
                        <div class="admin-info">
                            <h5>${adm.full_name}</h5>
                            <p>${adm.email} • <b>${adm.status}</b></p>
                        </div>
                        <div class="action-btns">
                            <button class="icon-btn btn-suspend" onclick="toggleStatus('${adm.id}', '${adm.status}')">ON/OFF</button>
                            <button class="icon-btn btn-delete" onclick="deleteAdmin('${adm.id}')">HAPUS</button>
                        </div>
                    `;
                    container.appendChild(div);
                });
            }
        }

        // Fungsi Buat Admin (Logika Register)
        async function createAdmin() {
            const email = document.getElementById('newAdminEmail').value;
            const name = document.getElementById('newAdminName').value;
            
            if(!email || !name) return alert("Isi semua kolom!");

            // Note: Di produksi, ini harus memicu Supabase Auth Invite
            const { error } = await _supabase.from('admin_profiles').insert([
                { email: email, full_name: name, status: 'Aktif', role: 'Staff' }
            ]);

            if(!error) {
                alert("Admin Berhasil Didaftarkan");
                fetchAdmins();
            }
        }

        // Fungsi Hapus & Non-aktifkan
        async function toggleStatus(id, currentStatus) {
            const newStatus = currentStatus === 'Aktif' ? 'Non-Aktif' : 'Aktif';
            await _supabase.from('admin_profiles').update({ status: newStatus }).eq('id', id);
            fetchAdmins();
        }

        async function deleteAdmin(id) {
            if(confirm("Hapus akses Admin ini secara permanen?")) {
                await _supabase.from('admin_profiles').delete().eq('id', id);
                fetchAdmins();
            }
        }

        fetchAdmins();
    </script>
</body>
</html>
