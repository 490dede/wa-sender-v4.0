<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Bantuan - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        :root {
            --primary: #8e44ad;
            --whatsapp: #25d366;
            --bg-light: #f4f7f6;
            --white: #ffffff;
            --text-dark: #2c3e50;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            color: var(--text-dark);
            font-size: 14px;
        }

        /* Container & Headers */
        header { background: var(--white); padding: 15px 20px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
        .container { padding: 15px; max-width: 500px; margin: auto; }

        /* Filter Styles */
        .filter-section { background: var(--white); border-radius: 20px; padding: 18px; margin-bottom: 20px; border: 1px solid #eee; }
        .filter-label { font-size: 11px; font-weight: 700; color: #7f8c8d; text-transform: uppercase; margin-bottom: 8px; display: block; }
        select { width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid #eee; background: #fafafa; margin-bottom: 15px; font-family: 'Inter'; }

        /* Date Picker Single Row */
        .date-range-box { background: #fafafa; border: 1.5px solid #eee; border-radius: 12px; padding: 12px; display: flex; align-items: center; gap: 10px; cursor: pointer; margin-bottom: 20px; }

        /* Message Card List */
        .msg-list { height: calc(100vh - 450px); overflow-y: auto; padding-bottom: 20px; }
        .msg-card { background: var(--white); border-radius: 18px; padding: 15px; margin-bottom: 12px; border: 1px solid #f0f0f0; display: flex; gap: 12px; cursor: pointer; }
        .msg-card:active { background: #f9f9f9; }
        .icon-circle { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #f0e6f6; color: var(--primary); font-size: 18px; }
        .msg-info { flex: 1; }
        .msg-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .user-name { font-weight: 700; font-size: 14px; }
        .time-stamp { font-size: 11px; color: #95a5a6; }
        .msg-preview { font-size: 13px; color: #7f8c8d; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
        .badge { font-size: 10px; padding: 3px 8px; border-radius: 8px; font-weight: 600; margin-top: 5px; display: inline-block; }
        .badge-payment { background: #e8f5e9; color: #2e7d32; }
        .badge-general { background: #fff3e0; color: #ef6c00; }

        /* Modal Chat */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: #e5ddd5; width: 100%; max-width: 500px; height: 100vh; margin: auto; display: flex; flex-direction: column; }
        .chat-header { background: var(--primary); color: white; padding: 15px; display: flex; align-items: center; gap: 15px; }
        .chat-body { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 14px; line-height: 1.5; }
        .bubble.in { background: var(--white); align-self: flex-start; border-bottom-left-radius: 2px; }
        .bubble.out { background: #dcf8c6; align-self: flex-end; border-bottom-right-radius: 2px; }
        
        .chat-footer { background: #f0f0f0; padding: 10px; display: flex; align-items: center; gap: 10px; }
        .input-box { flex: 1; background: white; border-radius: 25px; padding: 10px 15px; border: none; outline: none; }
        .btn-send { color: var(--primary); font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <i class="fas fa-arrow-left" onclick="window.history.back()"></i>
    <span style="margin-left: 15px; font-weight: 700;">Chat Bantuan</span>
</header>

<div class="container">
    <div class="filter-section">
        <span class="filter-label">Rentang Tanggal</span>
        <div class="date-range-box" id="dateRange">
            <i class="far fa-calendar-alt"></i>
            <span id="dateDisplay">Semua Tanggal</span>
        </div>

        <span class="filter-label">Negara</span>
        <select id="countryFilter">
            <option value="all">Semua Negara</option>
            <option value="ID">🇮🇩 Indonesia (+62)</option>
            <option value="US">🇺🇸 United States (+1)</option>
            <option value="MX">🇲🇽 Mexico (+52)</option>
        </select>

        <span class="filter-label">Kategori Pesan</span>
        <select id="msgType">
            <option value="all">Semua Pesan</option>
            <option value="payment">Konfirmasi Pembayaran</option>
            <option value="general">Pertanyaan Umum</option>
        </select>
    </div>

    <div class="msg-list" id="messageContainer">
        <div class="msg-card" onclick="openChat('Budi Santoso', 'Konfirmasi Pembayaran Paket PRO')">
            <div class="icon-circle"><i class="fas fa-user"></i></div>
            <div class="msg-info">
                <div class="msg-header">
                    <span class="user-name">Budi Santoso (+62)</span>
                    <span class="time-stamp">Sel, 03 Mar • 15:55</span>
                </div>
                <div class="msg-preview">Halo admin, saya sudah transfer untuk paket PRO...</div>
                <span class="badge badge-payment">Pembayaran</span>
            </div>
        </div>
    </div>
</div>

<div id="chatModal" class="modal">
    <div class="modal-content">
        <div class="chat-header">
            <i class="fas fa-arrow-left" onclick="closeChat()"></i>
            <div id="chatUserName" style="font-weight: 700;">User Name</div>
        </div>
        <div class="chat-body" id="chatBody">
            <div class="bubble in">Halo admin, saya ingin tanya paket PRO.</div>
            <div class="bubble out">Halo! Silakan, ada yang bisa kami bantu?</div>
        </div>
        <div class="chat-footer">
            <i class="fas fa-paperclip" style="color:#7f8c8d;"></i>
            <input type="text" class="input-box" placeholder="Ketik pesan...">
            <i class="fas fa-paper-plane btn-send"></i>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    // Inisialisasi Date Picker
    flatpickr("#dateRange", {
        mode: "range",
        dateFormat: "d M Y",
        onChange: function(selectedDates, dateStr) {
            document.getElementById('dateDisplay').innerText = dateStr.replace(" to ", " - ");
        }
    });

    function openChat(name, msg) {
        document.getElementById('chatUserName').innerText = name;
        document.getElementById('chatModal').style.display = 'block';
    }

    function closeChat() {
        document.getElementById('chatModal').style.display = 'none';
    }
</script>
</body>
</html>
