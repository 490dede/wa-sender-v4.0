<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Bantuan - WA-Sender v4.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        :root { --bg-page: #f4f7f6; --primary: #4A90E2; --success: #27ae60; --text-dark: #333; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg-page); color: var(--text-dark); }
        header { background: var(--white); padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .menu-btn { font-size: 24px; cursor: pointer; background: none; border: none; margin-right: 15px; }
        .container { padding: 20px; }
        .chat-card { background: var(--white); padding: 15px; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); cursor: pointer; }
        .chat-meta { display: flex; justify-content: space-between; font-size: 11px; color: #999; margin-bottom: 5px; }
        .status-dots { display: flex; gap: 5px; margin-top: 10px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; }
        .dot.active { background: var(--success); }
        .form-label { display: block; font-size: 13px; font-style: italic; color: #555; margin-bottom: 8px; }
        .sidenav { height: 100%; width: 0; position: fixed; z-index: 1000; top: 0; left: 0; background-color: var(--white); overflow-x: hidden; overflow-y: auto; transition: 0.3s; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        .sidenav a { padding: 15px 25px; text-decoration: none; font-size: 15px; color: #444; display: block; border-bottom: 1px solid #f9f9f9; }
    </style>
</head>
<body>
    <div id="mySidenav" class="sidenav">
    <div class="close-btn" onclick="closeNav()">&times;</div>
    <a href="dashboard_admin.html">📊 Dashboard Analytics</a>
    <a href="admin_management.html">👥 Admin Management</a>
    <a href="admin_revenue.html">💰 Revenue Tracking</a>
    <a href="post_editor.html">📝 Post Editor</a>
    <a href="admin_chat_bantuan.html">💬 Chat Bantuan</a>
    <a href="setting_bank.html">🏦 Pengaturan Bank & Logo</a>
    
    <div style="margin-top: 50px; border-top: 1px solid #f0f0f0;"></div>
    <a href="user_login.html" style="color: #e74c3c;">🚪 Keluar</a>
</div>
    <header><button class="menu-btn" onclick="openNav()">☰</button><div style="font-weight:600;">WA-Sender v4.0</div></header>
    <div class="container">
        <h3 style="font-size: 16px; margin: 0 0 20px;">CHAT BANTUAN USER</h3>
        <label class="form-label">Filter Tanggal:</label>
        <input type="date" style="width:100%; padding:12px; border-radius:8px; border:1px solid #ddd; margin-bottom:20px;">
        <div id="chat-list">
            <div class="chat-card">
                <div class="chat-meta"><span>01/03/2026</span><span>User: +62812...</span></div>
                <div style="font-size:14px; font-weight:600;">Gagal aktivasi paket Pro</div>
                <div style="font-size:12px; color:#666; margin-top:4px;">"Halo admin, saya sudah bayar tapi..."</div>
                <div class="status-dots">
                    <div class="dot active"></div><span style="font-size:10px; color:#666;">Responded</span>
                    <div class="dot"></div><span style="font-size:10px; color:#666;">Finished</span>
                </div>
            </div>
        </div>
    </div>
    <script>
        function openNav() { document.getElementById("mySidenav").style.width = "280px"; }
        function closeNav() { document.getElementById("mySidenav").style.width = "0"; }
    </script>
</body>
</html>
