<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Editor - WA-Sender v4.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

    <style>
        :root {
            --bg-page: #f4f7f6; /* Warna terang meredam kontras sesuai revisi */
            --primary: #4A90E2;
            --success: #27ae60;
            --text-dark: #333;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background: var(--bg-page);
            color: var(--text-dark);
        }

        /* Header Standar */
        header {
            background: white;
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #ddd;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .menu-btn { font-size: 24px; cursor: pointer; background: none; border: none; margin-right: 15px; }
        .app-title { font-weight: 600; font-size: 17px; flex-grow: 1; }

        .container { padding: 20px; }
        
        /* Card Layout */
        .post-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-style: italic; /* Sesuai revisi: judul kolom italic */
            color: #555;
            margin-bottom: 8px;
        }

        .input-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        /* Editor Height */
        #editor-container {
            height: 200px;
            margin-bottom: 20px;
            background: white;
        }

        .btn-publish {
            width: 100%;
            padding: 16px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Sidenav */
        .sidenav {
            height: 100%; width: 0; position: fixed; z-index: 1000; top: 0; left: 0;
            background-color: white; overflow-x: hidden; transition: 0.3s; box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }
        .sidenav a { padding: 15px 25px; text-decoration: none; font-size: 15px; color: #444; display: block; border-bottom: 1px solid #f9f9f9; }
        .closebtn { padding: 20px; text-align: right; font-size: 30px; cursor: pointer; display: block; }
    </style>
</head>
<body>

<div id="mySidenav" class="sidenav">
    <span class="closebtn" onclick="closeNav()">&times;</span>
    <a href="dashboard_admin.html">📊 Dashboard Utama</a>
    <a href="admin_post_editor.html" style="font-weight:600; color:var(--primary);">📝 Post Editor</a>
    <a href="admin_revenue.html">💰 Revenue Tracking</a>
    <a href="admin_chat_bantuan.html">💬 Chat Bantuan</a>
</div>

<header>
    <button class="menu-btn" onclick="openNav()">☰</button>
    <div class="app-title">WA-Sender v4.0</div>
</header>

<div class="container">
    <h3 style="font-size: 16px; margin-top: 0;">BUAT POSTINGAN BARU</h3>
    
    <div class="post-card">
        <label class="form-label">Target Negara / Target Country:</label>
        <select class="input-control" id="targetCountry">
            <option value="All">Semua Negara / All Countries</option>
            </select>

        <label class="form-label">Tipe Postingan / Post Type:</label>
        <select class="input-control" id="postType">
            <option value="Static Banner">Static Banner (Bawah Header)</option>
            <option value="Popup">Pop-up Informasi</option>
            <option value="Update Harga">Notifikasi Perubahan Harga</option>
        </select>

        <label class="form-label">Upload Gambar (Opsional):</label>
        <input type="file" class="input-control" id="postImage" accept="image/*">

        <label class="form-label">Konten Postingan / Post Content:</label>
        <div id="editor-container"></div>

        <button class="btn-publish" onclick="handlePublish()">PUBLIKASIKAN / PUBLISH</button>
    </div>
</div>

<script>
    // Inisialisasi Quill Editor
    var quill = new Quill('#editor-container', {
        theme: 'snow',
        placeholder: 'Tulis isi konten di sini...',
        modules: {
            toolbar: [
                ['bold', 'italic', 'underline'],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                ['clean']
            ]
        }
    });

    function openNav() { document.getElementById("mySidenav").style.width = "280px"; }
    function closeNav() { document.getElementById("mySidenav").style.width = "0"; }

    async function handlePublish() {
        const content = quill.root.innerHTML;
        const country = document.getElementById('targetCountry').value;
        const type = document.getElementById('postType').value;

        if(quill.getText().trim().length < 5) {
            return alert("Konten postingan terlalu pendek!");
        }

        alert("Postingan berhasil dipublikasikan ke target: " + country);
        // Logika simpan ke tabel 'posts' di Supabase
    }
</script>
</body>
</html>
