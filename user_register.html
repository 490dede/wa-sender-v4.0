<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration - WA-Sender v4.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f4f7f6; --tosca: #40E0D0; --primary: #4A90E2; --text: #333; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; padding: 40px 0; }
        .card { width: 90%; max-width: 380px; background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); position: relative; }
        .header-shape { background: var(--tosca); height: 100px; width: 150%; position: absolute; top: -40px; left: -25%; border-radius: 50%; z-index: 1; }
        .content { position: relative; z-index: 2; padding: 30px 25px; }
        h2 { font-size: 18px; color: #008080; text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 15px; }
        .label { display: block; font-size: 11px; font-style: italic; color: #666; margin-bottom: 5px; }
        .input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; margin-top: 10px; font-size: 14px; }
        .footer-link { text-align: center; font-size: 12px; margin-top: 20px; color: #777; }
    </style>
</head>
<body>
<div class="card">
    <div class="header-shape"></div>
    <div class="content">
        <h2>USER REGISTRATION</h2>
        <div class="form-group">
            <label class="label">Username / Nama Pengguna:</label>
            <input type="text" class="input" placeholder="Enter username">
        </div>
        <div class="form-group">
            <label class="label">Email / Surel:</label>
            <input type="email" class="input" placeholder="Enter email">
        </div>
        <div class="form-group">
            <label class="label">WhatsApp Number / Nomor WA:</label>
            <input type="tel" class="input" placeholder="e.g. 62812...">
        </div>
        <div class="form-group">
            <label class="label">Password / Kata Sandi:</label>
            <input type="password" class="input" placeholder="Enter password">
        </div>
        <button class="btn">REGISTRASI & LOGIN / SAVE & LOGIN</button>
        <div class="footer-link">Sudah punya akun? <a href="user_login.html" style="color:var(--primary);">Login di sini</a></div>
    </div>
</div>
</body>
</html>
