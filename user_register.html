<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration - WA-Sender v4.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #f4f7f6;
            --tosca-light: #40E0D0;
            --btn-blue: #4A90E2;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0;
        }

        .reg-container {
            width: 90%;
            max-width: 380px;
            background: var(--white);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            position: relative;
        }

        .header-shape {
            background: var(--tosca-light);
            height: 130px;
            width: 150%;
            position: absolute;
            top: -65px;
            left: -25%;
            border-bottom-left-radius: 50%;
            border-bottom-right-radius: 50%;
            z-index: 1;
        }

        .reg-content {
            position: relative;
            z-index: 2;
            padding: 25px 25px 30px;
        }

        .reg-content h2 {
            font-size: 18px;
            color: var(--white);
            text-align: center;
            margin: 0 0 50px 0;
            font-weight: 600;
            text-transform: uppercase;
        }

        .form-group { margin-bottom: 15px; }

        .form-label {
            display: block;
            font-size: 11px;
            font-style: italic;
            color: #666;
            margin-bottom: 5px;
        }

        .input-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #e8e8e8;
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
            box-sizing: border-box;
            background: #fafafa;
        }

        .btn-reg {
            width: 100%;
            padding: 15px;
            background: var(--btn-blue);
            color: var(--white);
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-top: 15px;
        }

        .footer-text {
            text-align: center;
            font-size: 12px;
            margin-top: 20px;
            color: #888;
        }
    </style>
</head>
<body>

<div class="reg-container">
    <div class="header-shape"></div>
    <div class="reg-content">
        <h2>User Registration</h2>
        
        <div class="form-group">
            <label class="form-label">Username / Nama Pengguna:</label>
            <input type="text" class="input-control" placeholder="Enter username">
        </div>

        <div class="form-group">
            <label class="form-label">Email / Surel:</label>
            <input type="email" class="input-control" placeholder="Enter email">
        </div>

        <div class="form-group">
            <label class="form-label">WhatsApp Number / Nomor WA:</label>
            <input type="tel" class="input-control" placeholder="e.g. 62812...">
        </div>

        <div class="form-group">
            <label class="form-label">Password / Kata Sandi:</label>
            <input type="password" class="input-control" placeholder="Enter password">
        </div>

        <button class="btn-reg">REGISTRASI & LOGIN / SAVE & LOGIN</button>
        
        <div class="footer-text">
            Sudah punya akun? <a href="user_login.html" style="color: var(--btn-blue); text-decoration: none; font-weight: 600;">Login di sini</a>
        </div>
    </div>
</div>

</body>
</html>
