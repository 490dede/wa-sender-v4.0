<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Zero - WA-Sender v4.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f4f7f6; --tosca: #40E0D0; --primary: #4A90E2; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        header { background: var(--white); padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .menu-btn { font-size: 24px; cursor: pointer; background: none; border: none; margin-right: 15px; }
        .admin-id { background: var(--white); padding: 20px; border-bottom: 1px solid #eee; }
        .admin-id b { font-size: 18px; color: #008080; }
        .container { padding: 20px; }
        .filter-card { background: var(--white); padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .label { display: block; font-size: 11px; font-style: italic; color: #666; margin-bottom: 5px; }
        .input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px; font-size: 13px; box-sizing: border-box; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--tosca); color: #008080; padding: 15px; border-radius: 12px; text-align: center; }
        .btn-export { width: 100%; padding: 15px; background: #27ae60; color: #fff; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 13px; }
        .sidenav { height: 100%; width: 0; position: fixed; z-index: 1000; top: 0; left: 0; background-color: var(--white); overflow-x: hidden; transition: 0.3s; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        .sidenav a { padding: 15px 25px; text-decoration: none; font-size: 15px; color: #444; display: block; border-bottom: 1px solid #f9f9f9; }
    </style>
</head>
<body>

<div id="mySidenav" class="sidenav">
    <a href="javascript:void(0)" onclick="closeNav()" style="padding: 20px; text-align: right; font-size: 30px;">&times;</a>
    <a href="dashboard_admin_zero.html" style="font-weight:600; color:var(--primary);">📊 Dashboard Zero</a>
    <a href="admin_management.html">🔑 Manage Admin</a>
    <a href="setting_bank.html">🏦 Bank & QRIS</a>
    <a href="post_editor_zero.html">📝 Post Editor (Zero)</a>
    <a href="admin_revenue.html">💰 Revenue</a>
    <a href="admin_chat_bantuan.html">💬 Chat Bantuan</a>
</div>

<header>
    <button class="menu-btn" onclick="openNav()">☰</button>
    <div style="font-weight:600; color:var(--primary);">WA-Sender v4.0</div>
</header>

<div class="admin-id">
    <small style="color:var(--primary); font-weight:600;">ACCESS LEVEL:</small><br>
    <b>Admin-Zero</b>
</div>

<div class="container">
    <h3 style="font-size: 16px; margin: 0 0 15px;">OWNER ANALYTICS</h3>
    <div class="filter-card">
        <label class="label">Rentang Tanggal Kustom / Custom Date Range:</label>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <input type="date" class="input">
            <input type="date" class="input">
        </div>
        <label class="label">Pilih Negara / Select Country:</label>
        <select class="input">
            <option>Semua Negara / All Countries</option>
        </select>
    </div>
    <div class="stat-grid">
        <div class="stat-card"><small>TOTAL USER</small><br><b>0</b></div>
        <div class="stat-card"><small>USER AKTIF</small><br><b>0</b></div>
    </div>
    <button class="btn-export">EXPORT TO EXCEL (.xlsx)</button>
</div>

<script>
    function openNav() { document.getElementById("mySidenav").style.width = "280px"; }
    function closeNav() { document.getElementById("mySidenav").style.width = "0"; }
</script>
</body>
</html>
