<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Editor Staff - WA-Sender v4.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

    <style>
        :root {
            --bg-page: #f4f7f6; 
            --primary: #4A90E2;
            --success: #27ae60;
            --text-dark: #333;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background: var(--bg-page);
            color: var(--text-dark);
            padding-bottom: 50px;
        }

        header {
            background: var(--white);
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #ddd;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .menu-btn { font-size: 24px; cursor: pointer; background: none; border: none; margin-right: 15px; }
        .app-title { font-weight: 600; font-size: 17px; flex-grow: 1; }

        .container { padding: 20px; }
        
        .card {
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-style: italic; 
            color: #555;
            margin-bottom: 8px;
        }

        .input-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        #editor-container {
            height: 180px;
            margin-bottom: 20px;
            background: var(--white);
        }

        .btn-publish {
            width: 100%;
            padding: 16px;
            background: var(--success);
            color: var(--white);
            border: none;
            border-radius: 10px;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
        }

        /* Histori Section */
        .section-title {
            font-size: 15px;
            font-weight: 600;
            margin: 30px 0 15px;
            color: var(--primary);
            text-transform: uppercase;
        }

        .filter-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .history-card {
            background: var(--white);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 12px;
            border-left: 4px solid var(--primary);
        }

        .history-meta {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #999;
            margin-bottom: 8px;
        }

        .history-content {
            font-size: 13px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            background: #eee;
            color: #666;
        }

        /* Sidenav */
        .sidenav {
            height: 100%; width: 0; position: fixed; z-index: 1000; top: 0; left: 0;
            background-color: var(--white); overflow-x: hidden; transition: 0.3s; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }
        .sidenav a { padding: 15px 25px; text-decoration: none; font-size: 15px; color: #444; display: block; border-bottom: 1px solid #f9f9f9; }
        .closebtn { padding: 20px; text-align: right; font-size: 30px; cursor: pointer; display: block; }
    </style>
</head>
<body>

<div id="mySidenav" class="sidenav">
    <span class="closebtn" onclick="closeNav()">&times;</span>
    <a href="dashboard_admin.html">📊 Dashboard Utama</a>
    <a href="post_editor_staff.html" style="font-weight:600; color:var(--primary);">📝 Post Editor</a>
    <a href="admin_revenue.html">💰 Revenue Tracking</a>
    <a href="admin_chat_bantuan.html">💬 Chat Bantuan</a>
</div>

<header>
    <button class="menu-btn" onclick="openNav()">☰</button>
    <div class="app-title">WA-Sender v4.0</div>
</header>

<div class="container">
    <h3 style="font-size: 16px; margin: 0 0 20px;">BUAT POSTINGAN BARU</h3>
    
    <div class="card">
        <label class="form-label">Target Negara / Target Country:</label>
        <select class="input-control" id="targetCountry">
            <option value="All">Semua Negara / All Countries</option>
        </select>

        <label class="form-label">Tipe Postingan / Post Type:</label>
        <select class="input-control" id="postType">
            <option value="Static Banner">Static Banner (Bawah Header)</option>
            <option value="Popup">Pop-up Informasi</option>
            <option value="Update Harga">Update Harga Paket</option>
        </select>

        <label class="form-label">Upload Gambar (Opsional):</label>
        <input type="file" class="input-control" id="postImage" accept="image/*">

        <label class="form-label">Konten Postingan / Post Content:</label>
        <div id="editor-container"></div>

        <button class="btn-publish" onclick="handlePublish()">PUBLIKASIKAN / PUBLISH</button>
    </div>

    <div class="section-title">Histori Postingan</div>
    
    <div class="filter-row">
        <div>
            <label class="form-label">Filter Jenis:</label>
            <select class="input-control" id="filterType" onchange="fetchHistory()">
                <option value="All">Semua Jenis</option>
                <option value="Static Banner">Static Banner</option>
                <option value="Popup">Pop-up</option>
                <option value="Update Harga">Update Harga</option>
            </select>
        </div>
        <div>
            <label class="form-label">Filter Tanggal:</label>
            <input type="date" class="input-control" id="filterDate" onchange="fetchHistory()">
        </div>
    </div>

    <div id="history-list">
        <p style="text-align: center; font-size: 12px; color: #999;">Memuat histori...</p>
    </div>
</div>

<script>
    var quill = new Quill('#editor-container', {
        theme: 'snow',
        placeholder: 'Tulis pesan promosi atau informasi di sini...',
        modules: { toolbar: [['bold', 'italic', 'underline'], ['clean']] }
    });

    const _supabase = supabase.createClient('URL', 'KEY');

    function openNav() { document.getElementById("mySidenav").style.width = "280px"; }
    function closeNav() { document.getElementById("mySidenav").style.width = "0"; }

    async function handlePublish() {
        // Logika insert data ke Supabase
        alert("Postingan berhasil disimpan!");
        fetchHistory();
    }

    async function fetchHistory() {
        const type = document.getElementById('filterType').value;
        const date = document.getElementById('filterDate').value;
        
        // Placeholder data untuk simulasi tampilan list card
        const listArea = document.getElementById('history-list');
        listArea.innerHTML = `
            <div class="history-card">
                <div class="history-meta">
                    <span>01 Mar 2026</span>
                    <span class="badge">Static Banner</span>
                </div>
                <div class="history-content">
                    <b>Promo Ramadhan!</b> Dapatkan diskon langganan Pro sebesar 20% untuk semua negara...
                </div>
                <div style="font-size: 10px; color: var(--primary); margin-top: 8px;">Target: Indonesia (+62)</div>
            </div>
        `;
    }

    fetchHistory();
</script>
</body>
</html>
